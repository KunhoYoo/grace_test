<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시니어 공동구매 MVP 프로토타입</title>
  <style>
    :root {
      --bg: #ffffff;
      --soft-bg: #f6f8fb;
      --card: #ffffff;
      --text: #191f28;
      --sub: #6b7280;
      --line: #e5e8ef;
      --blue: #3182f6;
      --blue-dark: #1c64d1;
      --green: #18a058;
      --red: #e5484d;
      --yellow: #f59f00;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 22px;
      --radius-sm: 14px;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      background: var(--soft-bg);
      color: var(--text);
      line-height: 1.5;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      background: linear-gradient(135deg, #3182f6, #7cb8ff);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .brand-sub {
      font-size: 12px;
      color: var(--sub);
      margin-top: -2px;
    }

    .home-btn {
      padding: 10px 14px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--blue);
      font-weight: 800;
      white-space: nowrap;
    }

    .layout {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px;
    }

    .screen {
      display: none;
      animation: fadeIn 0.18s ease-out;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      background: var(--card);
      border-radius: 30px;
      padding: 26px 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: #e8f2ff;
      right: -90px;
      top: -90px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 46px);
      line-height: 1.12;
      letter-spacing: -0.06em;
    }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(22px, 5vw, 30px);
      letter-spacing: -0.04em;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 19px;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
    }

    .hero-desc {
      margin-top: 12px;
      color: var(--sub);
      font-size: 16px;
      max-width: 650px;
    }

    .role-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 20px;
    }

    .role-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      text-align: left;
      transition: transform 0.16s, box-shadow 0.16s;
    }

    .role-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .role-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: #f1f6ff;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .role-title {
      font-size: 21px;
      font-weight: 900;
      margin-bottom: 5px;
      letter-spacing: -0.04em;
    }

    .role-desc {
      color: var(--sub);
      font-size: 14px;
    }

    .nav-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 16px;
      scrollbar-width: none;
    }

    .nav-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      padding: 11px 14px;
      border-radius: 999px;
      background: #fff;
      color: var(--sub);
      border: 1px solid var(--line);
      font-weight: 800;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 6px 0 16px;
    }

    .section-sub {
      color: var(--sub);
      font-size: 14px;
      margin-top: 3px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .stat-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
    }

    .stat-label {
      color: var(--sub);
      font-size: 14px;
      font-weight: 700;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .panel {
      background: #fff;
      border-radius: var(--radius);
      padding: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 850;
      color: #374151;
      margin-bottom: 7px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 13px 14px;
      background: #fff;
      color: var(--text);
      outline: none;
      min-height: 48px;
    }

    .field textarea {
      min-height: 86px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.12);
    }

    .btn-row {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 12px 15px;
      border-radius: 15px;
      font-weight: 850;
      background: #edf2f7;
      color: #253042;
      min-height: 46px;
    }

    .btn.primary {
      background: var(--blue);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--blue-dark);
    }

    .btn.success {
      background: #e8f8ef;
      color: var(--green);
    }

    .btn.danger {
      background: #fff0f0;
      color: var(--red);
    }

    .btn.warning {
      background: #fff6db;
      color: #9a6700;
    }

    .btn.block {
      width: 100%;
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .card-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .product-card,
    .row-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .product-card {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 14px;
      align-items: start;
    }

    .thumb {
      width: 96px;
      height: 96px;
      border-radius: 18px;
      object-fit: cover;
      background: #edf2f7;
    }

    .product-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .meta {
      color: var(--sub);
      font-size: 13px;
    }

    .price {
      font-size: 18px;
      font-weight: 950;
      margin-top: 6px;
    }

    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 9px;
      border-radius: 999px;
      background: #f2f4f6;
      color: #4b5563;
      font-size: 12px;
      font-weight: 800;
    }

    .badge.blue {
      background: #eaf3ff;
      color: var(--blue);
    }

    .badge.green {
      background: #e8f8ef;
      color: var(--green);
    }

    .badge.red {
      background: #fff0f0;
      color: var(--red);
    }

    .badge.yellow {
      background: #fff6db;
      color: #9a6700;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 13px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-size: 13px;
      font-weight: 900;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 28px 12px;
      text-align: center;
      color: var(--sub);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }

    .notice {
      padding: 13px 14px;
      border-radius: 16px;
      background: #fff6db;
      color: #7c4a00;
      font-size: 14px;
      font-weight: 700;
      margin: 12px 0;
    }

    .buyer-shell {
      max-width: 720px;
      margin: 0 auto;
    }

    .buyer-product {
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .buyer-main-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #edf2f7;
    }

    .buyer-body {
      padding: 18px;
    }

    .recommend {
      background: #f2f7ff;
      border-radius: 18px;
      padding: 14px;
      color: #174ea6;
      font-weight: 800;
      margin: 12px 0;
    }

    .detail-img {
      width: 100%;
      border-radius: 18px;
      margin-top: 12px;
      border: 1px solid var(--line);
      background: #f8fafc;
    }

    .complete-box {
      background: #fff;
      border-radius: 28px;
      padding: 26px 18px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .complete-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 16px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--green);
      font-size: 42px;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: #191f28;
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 800;
      z-index: 50;
      transition: 0.2s;
      max-width: calc(100vw - 28px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .small {
      font-size: 13px;
      color: var(--sub);
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 14px 0;
    }

    .inline-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .mini-btn {
      padding: 8px 10px;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 850;
      background: #edf2f7;
      color: #253042;
    }

    .mini-btn.success {
      background: #e8f8ef;
      color: var(--green);
    }

    .mini-btn.danger {
      background: #fff0f0;
      color: var(--red);
    }

    .mini-btn.blue {
      background: #eaf3ff;
      color: var(--blue);
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 720px) {
      .role-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .stats-grid {
        grid-template-columns: repeat(5, 1fr);
      }

      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .form-grid .span-2 {
        grid-column: span 2;
      }

      .filters {
        grid-template-columns: repeat(2, 1fr);
      }

      .panel {
        padding: 22px;
      }

      .hero {
        padding: 36px;
      }
    }

    @media (max-width: 430px) {
      .layout {
        padding: 14px;
      }

      .product-card {
        grid-template-columns: 82px 1fr;
        gap: 12px;
      }

      .thumb {
        width: 82px;
        height: 82px;
        border-radius: 16px;
      }

      .topbar-inner {
        padding: 12px 14px;
      }

      .brand-sub {
        display: none;
      }

      .home-btn {
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="logo">공</div>
          <div>
            <div class="brand-title">시니어 공동구매 MVP</div>
            <div class="brand-sub">관리자 · 큐레이터 · 구매자 통합 프로토타입</div>
          </div>
        </div>
        <button class="home-btn" onclick="goHome()">홈으로</button>
      </div>
    </header>

    <main class="layout">
      <section id="home" class="screen active">
        <div class="hero">
          <div class="hero-content">
            <span class="eyebrow">Mock Data Prototype</span>
            <h1>공동구매 운영 흐름을<br />한 번에 검증합니다</h1>
            <p class="hero-desc">
              실제 서버 연결 전, 상품 등록부터 큐레이터 신청, 승인, 구매자 주문, 주문 관리, 커미션 정산까지
              한 파일에서 테스트할 수 있는 MVP 화면입니다.
            </p>

            <div class="role-grid">
              <button class="role-card" onclick="openRole('admin')">
                <div class="role-icon">🛠️</div>
                <div class="role-title">관리자 화면</div>
                <div class="role-desc">상품 등록, 신청 승인, 주문 관리, 정산 확인</div>
              </button>

              <button class="role-card" onclick="openRole('curator')">
                <div class="role-icon">🤝</div>
                <div class="role-title">큐레이터 화면</div>
                <div class="role-desc">공동구매 신청, 판매 URL 확인, 판매 현황 확인</div>
              </button>

              <button class="role-card" onclick="openRole('buyer')">
                <div class="role-icon">🛒</div>
                <div class="role-title">구매자 화면</div>
                <div class="role-desc">상품 상세 확인, 주문 입력, 주문 완료</div>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section id="admin" class="screen">
        <div class="nav-tabs" id="adminTabs"></div>
        <div id="adminContent"></div>
      </section>

      <section id="curator" class="screen">
        <div class="nav-tabs" id="curatorTabs"></div>
        <div id="curatorContent"></div>
      </section>

      <section id="buyer" class="screen">
        <div id="buyerContent"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const money = value => Number(value || 0).toLocaleString("ko-KR") + "원";
    const safeNum = value => Number(value || 0);

    const state = {
      currentScreen: "home",
      adminTab: "dashboard",
      curatorTab: "dashboard",
      buyerStep: "detail",
      selectedBuyerProductId: 1,
      selectedApplicationIds: new Set(),

      applicationGradeFilter: "전체",

      products: [
        {

          detailImage: "https://images.unsplash.com/photo-1570913149827-d2ac84ab3f9a?auto=format&fit=crop&w=1200&q=80",
          price: 36900,

          desc: "동네 지인들과 함께 사기 좋은 제철 과일 상품입니다."
        },
        {
          id: 3,
          name: "무릎 보호대 2개 세트",
          mainImage: "https://images.unsplash.com/photo-1571019613914-85f342c6a11e?auto=format&fit=crop&w=900&q=80",

        }
      ],

      applications: [
        { id: 1, productId: 1, curatorName: "김영희", area: "서울 강동구", grade: "A", status: "승인대기" },
        { id: 2, productId: 2, curatorName: "박정자", area: "경기 성남시", grade: "B", status: "승인대기" },
        { id: 3, productId: 1, curatorName: "이순자", area: "서울 송파구", grade: "A", status: "승인완료" },
        { id: 4, productId: 3, curatorName: "최민수", area: "부산 해운대구", grade: "C", status: "거절" }
      ],

      orders: [
        { id: 1, buyerName: "오민정", phone: "010-1111-2222", address: "서울 송파구", productId: 1, quantity: 2, curatorName: "이순자", status: "주문접수", createdAt: "2026-05-17" },
        { id: 2, buyerName: "한지훈", phone: "010-3333-4444", address: "경기 수원시", productId: 2, quantity: 1, curatorName: "박정자", status: "배송준비", createdAt: "2026-05-17" }
      ]
    };

    const adminTabs = [
      { key: "dashboard", label: "대시보드" },
      { key: "products", label: "상품 등록" },
      { key: "applications", label: "신청 승인" },
      { key: "orders", label: "주문 관리" },
      { key: "settlement", label: "정산/커미션" }
    ];

    const curatorTabs = [
      { key: "dashboard", label: "내 현황" },
      { key: "apply", label: "상품 신청" }
    ];

    function productById(id) {
      return state.products.find(p => p.id === Number(id));
    }

    function showToast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1800);
    }

    function setScreen(screen) {
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.getElementById(screen).classList.add("active");
      state.currentScreen = screen;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goHome() {
      setScreen("home");
    }

    function openRole(role) {
      setScreen(role);
      if (role === "admin") renderAdmin();
      if (role === "curator") renderCurator();
      if (role === "buyer") {
        state.buyerStep = "detail";
        renderBuyer();
      }
    }

    function renderAdminTabs() {
      document.getElementById("adminTabs").innerHTML = adminTabs.map(tab => `
        <button class="tab-btn ${state.adminTab === tab.key ? "active" : ""}" onclick="setAdminTab('${tab.key}')">${tab.label}</button>
      `).join("");
    }

    function setAdminTab(tab) {
      state.adminTab = tab;
      state.selectedApplicationIds.clear();
      renderAdmin();
    }

    function renderCuratorTabs() {
      document.getElementById("curatorTabs").innerHTML = curatorTabs.map(tab => `
        <button class="tab-btn ${state.curatorTab === tab.key ? "active" : ""}" onclick="setCuratorTab('${tab.key}')">${tab.label}</button>
      `).join("");
    }

    function setCuratorTab(tab) {
      state.curatorTab = tab;
      renderCurator();
    }

    function getDashboardStats() {
      const totalProducts = state.products.length;
      const pendingApplications = state.applications.filter(a => a.status === "승인대기").length;
      const totalOrders = state.orders.length;
      const totalSales = state.orders.reduce((sum, o) => sum + productById(o.productId).price * o.quantity, 0);
      const totalCommission = state.orders.reduce((sum, o) => {
        const p = productById(o.productId);
        return sum + p.price * o.quantity * (p.commissionRate / 100);
      }, 0);

      return { totalProducts, pendingApplications, totalOrders, totalSales, totalCommission };
    }

    function renderAdmin() {
      renderAdminTabs();
      const content = document.getElementById("adminContent");

      if (state.adminTab === "dashboard") content.innerHTML = renderAdminDashboard();
      if (state.adminTab === "products") content.innerHTML = renderProductAdmin();
      if (state.adminTab === "applications") content.innerHTML = renderApplicationAdmin();
      if (state.adminTab === "orders") content.innerHTML = renderOrderAdmin();
      if (state.adminTab === "settlement") content.innerHTML = renderSettlement();
    }

    function renderAdminDashboard() {
      const s = getDashboardStats();
      return `
        <div class="section-head">
          <div>
            <h2>관리자 대시보드</h2>
            <div class="section-sub">운영자가 오늘 확인해야 할 핵심 숫자입니다.</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">전체 상품 수</div>
            <div class="stat-value">${s.totalProducts}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">승인 대기 신청</div>
            <div class="stat-value">${s.pendingApplications}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">총 주문 수</div>
            <div class="stat-value">${s.totalOrders}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">총 매출</div>
            <div class="stat-value">${money(s.totalSales)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">커미션 예정액</div>
            <div class="stat-value">${money(Math.round(s.totalCommission))}</div>
          </div>
        </div>

        <div class="panel" style="margin-top:14px;">
          <h3>운영 체크</h3>
          <p class="small">상품 등록 → 큐레이터 신청 승인 → 전용 URL 판매 → 주문 관리 → 정산 확인 순서로 업무가 진행됩니다.</p>
        </div>
      `;
    }

    function renderProductAdmin() {
      return `
        <div class="section-head">
          <div>
            <h2>관리자 상품 등록</h2>
            <div class="section-sub">공동구매로 판매할 상품을 등록합니다.</div>
          </div>
        </div>

        <div class="panel">
          <h3>새 상품 등록</h3>
          <form id="productForm" onsubmit="addProduct(event)">
            <div class="form-grid">
              <div class="field">
                <label>상품명</label>
                <input name="name" required placeholder="예: 제주 감귤 5kg" />
              </div>
              <div class="field">
                <label>상태값</label>
                <select name="status">
                  <option>판매중</option>
                  <option>준비중</option>
                  <option>품절</option>
                </select>
              </div>
              <div class="field span-2">
                <label>대표 이미지 URL</label>
                <input name="mainImage" required placeholder="https://..." value="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=900&q=80" />
              </div>
              <div class="field span-2">
                <label>상세페이지 이미지 URL</label>
                <input name="detailImage" required placeholder="https://..." value="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=80" />
              </div>
              <div class="field">
                <label>판매가</label>
                <input name="price" type="number" min="0" required placeholder="29900" />
              </div>
              <div class="field">
                <label>공급가</label>
                <input name="cost" type="number" min="0" required placeholder="18500" />
              </div>
              <div class="field">
                <label>커미션율 (%)</label>
                <input name="commissionRate" type="number" min="0" max="100" required placeholder="10" />
              </div>
              <div class="field">
                <label>재고</label>
                <input name="stock" type="number" min="0" required placeholder="100" />
              </div>
              <div class="field span-2">
                <label>판매 가능 지역</label>
                <input name="area" required placeholder="예: 서울 · 경기 / 전국" />
              </div>
              <div class="field span-2">
                <label>상품 설명</label>
                <textarea name="desc" placeholder="큐레이터가 설명하기 쉬운 상품 소개 문구"></textarea>
              </div>
            </div>
            <div class="btn-row" style="margin-top:14px;">
              <button class="btn primary" type="submit">상품 저장</button>
            </div>
          </form>
        </div>

        <div class="panel">
          <h3>등록 상품 리스트</h3>
          <div class="card-list">
            ${state.products.map(renderProductCardForAdmin).join("")}
          </div>
        </div>
      `;
    }

    function renderProductCardForAdmin(p) {
      return `
        <div class="product-card">
          <img class="thumb" src="${p.mainImage}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x300?text=Image'" />
          <div>
            <div class="product-title">${p.name}</div>
            <div class="meta">판매가 ${money(p.price)} · 공급가 ${money(p.cost)} · 재고 ${p.stock}개</div>
            <div class="badge-row">
              <span class="badge blue">커미션 ${p.commissionRate}%</span>
              <span class="badge">${p.area}</span>
              <span class="badge ${p.status === "판매중" ? "green" : p.status === "품절" ? "red" : "yellow"}">${p.status}</span>
            </div>
          </div>
        </div>
      `;
    }

    function addProduct(event) {
      event.preventDefault();
      const fd = new FormData(event.target);
      const product = {
        id: Date.now(),
        name: fd.get("name").trim(),
        mainImage: fd.get("mainImage").trim(),
        detailImage: fd.get("detailImage").trim(),
        price: safeNum(fd.get("price")),
        cost: safeNum(fd.get("cost")),
        commissionRate: safeNum(fd.get("commissionRate")),
        stock: safeNum(fd.get("stock")),
        area: fd.get("area").trim(),
        status: fd.get("status"),
        desc: fd.get("desc").trim() || "큐레이터가 동네 고객에게 소개하기 좋은 공동구매 상품입니다."
      };

      state.products.unshift(product);
      event.target.reset();
      showToast("상품이 등록되었습니다.");
      renderAdmin();
    }

    function getFilteredApplications() {
      return state.applications.filter(app => {
        const p = productById(app.productId);
        const productOk = state.applicationProductFilter === "전체" || p.name === state.applicationProductFilter;
        const gradeOk = state.applicationGradeFilter === "전체" || app.grade === state.applicationGradeFilter;
        return productOk && gradeOk;
      });
    }

    function renderApplicationAdmin() {
      const productOptions = ["전체", ...state.products.map(p => p.name)];
      const gradeOptions = ["전체", "A", "B", "C"];
      const apps = getFilteredApplications();

      return `
        <div class="section-head">
          <div>
            <h2>큐레이터 상품 신청 관리</h2>
            <div class="section-sub">신청 건을 확인하고 개별 또는 일괄 승인/거절합니다.</div>
          </div>
        </div>

        <div class="panel">
          <div class="filters">
            <div class="field">
              <label>상품별 필터</label>
              <select onchange="setApplicationFilter('product', this.value)">
                ${productOptions.map(v => `<option ${state.applicationProductFilter === v ? "selected" : ""}>${v}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label>등급별 필터</label>
              <select onchange="setApplicationFilter('grade', this.value)">
                ${gradeOptions.map(v => `<option ${state.applicationGradeFilter === v ? "selected" : ""}>${v}</option>`).join("")}
              </select>
            </div>
          </div>

          <div class="btn-row" style="margin-bottom:12px;">
            <button class="btn" onclick="toggleAllApplications()">전체 선택</button>
            <button class="btn success" onclick="bulkUpdateApplications('승인완료')">선택 승인</button>
            <button class="btn danger" onclick="bulkUpdateApplications('거절')">선택 거절</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>선택</th>
                  <th>상품명</th>
                  <th>큐레이터명</th>
                  <th>신청 지역</th>
                  <th>등급</th>
                  <th>상태</th>
                  <th>처리</th>
                </tr>
              </thead>
              <tbody>
                ${apps.length ? apps.map(renderApplicationRow).join("") : `<tr><td colspan="7">신청 내역이 없습니다.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderApplicationRow(app) {
      const p = productById(app.productId);
      return `
        <tr>
          <td><input type="checkbox" ${state.selectedApplicationIds.has(app.id) ? "checked" : ""} onchange="toggleApplication(${app.id}, this.checked)" /></td>
          <td>${p.name}</td>
          <td>${app.curatorName}</td>
          <td>${app.area}</td>
          <td><span class="badge blue">${app.grade}등급</span></td>
          <td>${statusBadge(app.status)}</td>
          <td>
            <div class="inline-actions">
              <button class="mini-btn success" onclick="updateApplicationStatus(${app.id}, '승인완료')">승인</button>
              <button class="mini-btn danger" onclick="updateApplicationStatus(${app.id}, '거절')">거절</button>
            </div>
          </td>
        </tr>
      `;
    }

    function statusBadge(status) {
      const cls = status === "승인완료" ? "green" : status === "거절" ? "red" : "yellow";
      return `<span class="badge ${cls}">${status}</span>`;
    }

    function setApplicationFilter(type, value) {
      if (type === "product") state.applicationProductFilter = value;
      if (type === "grade") state.applicationGradeFilter = value;
      state.selectedApplicationIds.clear();
      renderAdmin();
    }

    function toggleApplication(id, checked) {
      if (checked) state.selectedApplicationIds.add(id);
      else state.selectedApplicationIds.delete(id);
    }

    function toggleAllApplications() {
      const apps = getFilteredApplications();
      const allSelected = apps.every(app => state.selectedApplicationIds.has(app.id));
      if (allSelected) apps.forEach(app => state.selectedApplicationIds.delete(app.id));
      else apps.forEach(app => state.selectedApplicationIds.add(app.id));
      renderAdmin();
    }

    function updateApplicationStatus(id, status) {
      const app = state.applications.find(a => a.id === id);
      if (!app) return;
      app.status = status;
      showToast(`신청 건이 ${status} 처리되었습니다.`);
      renderAdmin();
    }

    function bulkUpdateApplications(status) {
      if (state.selectedApplicationIds.size === 0) {
        showToast("선택된 신청 건이 없습니다.");
        return;
      }
      state.applications.forEach(app => {
        if (state.selectedApplicationIds.has(app.id)) app.status = status;
      });
      state.selectedApplicationIds.clear();
      showToast(`선택 신청 건이 ${status} 처리되었습니다.`);
      renderAdmin();
    }

    function renderOrderAdmin() {
      return `
        <div class="section-head">
          <div>
            <h2>주문 관리</h2>
            <div class="section-sub">구매자 주문 상태를 확인하고 변경합니다.</div>
          </div>
        </div>

        <div class="panel">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>주문자명</th>
                  <th>상품명</th>
                  <th>수량</th>
                  <th>금액</th>
                  <th>담당 큐레이터</th>
                  <th>주문 상태</th>
                  <th>상태 변경</th>
                </tr>
              </thead>
              <tbody>
                ${state.orders.length ? state.orders.map(renderOrderRow).join("") : `<tr><td colspan="7">주문 내역이 없습니다.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderOrderRow(order) {
      const p = productById(order.productId);
      return `
        <tr>
          <td>${order.buyerName}</td>
          <td>${p.name}</td>
          <td>${order.quantity}</td>
          <td>${money(p.price * order.quantity)}</td>
          <td>${order.curatorName}</td>
          <td>${statusBadge(order.status)}</td>
          <td>
            <select onchange="changeOrderStatus(${order.id}, this.value)">
              ${["주문접수", "배송준비", "배송중", "배송완료", "취소"].map(s => `<option ${order.status === s ? "selected" : ""}>${s}</option>`).join("")}
            </select>
          </td>
        </tr>
      `;
    }

    function changeOrderStatus(orderId, status) {
      const order = state.orders.find(o => o.id === orderId);
      if (!order) return;
      order.status = status;
      showToast("주문 상태가 변경되었습니다.");
      renderAdmin();
    }

    function renderSettlement() {
      const curatorMap = {};
      state.orders.forEach(order => {
        const p = productById(order.productId);
        if (!curatorMap[order.curatorName]) {
          curatorMap[order.curatorName] = {
            curatorName: order.curatorName,
            count: 0,
            sales: 0,
            commission: 0,
            rates: new Set()
          };
        }
        curatorMap[order.curatorName].count += order.quantity;
        curatorMap[order.curatorName].sales += p.price * order.quantity;
        curatorMap[order.curatorName].commission += p.price * order.quantity * (p.commissionRate / 100);
        curatorMap[order.curatorName].rates.add(p.commissionRate);
      });

      const rows = Object.values(curatorMap);

      return `
        <div class="section-head">
          <div>
            <h2>정산/커미션 화면</h2>
            <div class="section-sub">큐레이터별 판매 건수, 매출, 커미션 예정액을 확인합니다.</div>
          </div>
        </div>

        <div class="panel">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>큐레이터</th>
                  <th>판매 건수</th>
                  <th>매출</th>
                  <th>커미션율</th>
                  <th>커미션 예정액</th>
                  <th>정산 상태</th>
                </tr>
              </thead>
              <tbody>
                ${rows.length ? rows.map(row => `
                  <tr>
                    <td>${row.curatorName}</td>
                    <td>${row.count}건</td>
                    <td>${money(row.sales)}</td>
                    <td>${Array.from(row.rates).join("%, ")}%</td>
                    <td>${money(Math.round(row.commission))}</td>
                    <td><span class="badge yellow">정산 예정</span></td>
                  </tr>
                `).join("") : `<tr><td colspan="6">정산 내역이 없습니다.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderCurator() {
      renderCuratorTabs();
      const content = document.getElementById("curatorContent");
      if (state.curatorTab === "dashboard") content.innerHTML = renderCuratorDashboard();
      if (state.curatorTab === "apply") content.innerHTML = renderCuratorApply();
    }

    function getCuratorSales(curatorName) {
      const orders = state.orders.filter(o => o.curatorName === curatorName);
      const count = orders.reduce((sum, o) => sum + o.quantity, 0);
      const sales = orders.reduce((sum, o) => sum + productById(o.productId).price * o.quantity, 0);
      const commission = orders.reduce((sum, o) => {
        const p = productById(o.productId);
        return sum + p.price * o.quantity * (p.commissionRate / 100);
      }, 0);
      return { count, sales, commission };
    }

    function renderCuratorDashboard() {
      const curatorName = "이순자";
      const myApps = state.applications.filter(a => a.curatorName === curatorName);
      const mySales = getCuratorSales(curatorName);

      return `
        <div class="section-head">
          <div>
            <h2>큐레이터 대시보드</h2>
            <div class="section-sub">${curatorName} 큐레이터님의 신청, 판매, 정산 예상 현황입니다.</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">내 신청 상품</div>
            <div class="stat-value">${myApps.length}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">승인 완료</div>
            <div class="stat-value">${myApps.filter(a => a.status === "승인완료").length}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">판매 건수</div>
            <div class="stat-value">${mySales.count}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">매출</div>
            <div class="stat-value">${money(mySales.sales)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">예상 커미션</div>
            <div class="stat-value">${money(Math.round(mySales.commission))}</div>
          </div>
        </div>

        <div class="panel" style="margin-top:14px;">
          <h3>내가 신청한 상품</h3>
          <div class="card-list">
            ${myApps.length ? myApps.map(app => renderMyApplicationCard(app)).join("") : `<div class="empty">아직 신청한 상품이 없습니다.</div>`}
          </div>
        </div>

        <div class="panel">
          <h3>신청 가능한 공동구매 상품</h3>
          <div class="card-list">
            ${state.products.filter(p => p.status === "판매중").map(p => renderCuratorProductCard(p)).join("")}
          </div>
        </div>
      `;
    }

    function renderMyApplicationCard(app) {
      const p = productById(app.productId);
      const approved = app.status === "승인완료";
      return `
        <div class="product-card">
          <img class="thumb" src="${p.mainImage}" alt="${p.name}" />
          <div>
            <div class="product-title">${p.name}</div>
            <div class="meta">신청 지역 ${app.area} · ${app.grade}등급</div>
            <div class="badge-row">
              ${statusBadge(app.status)}
              <span class="badge blue">커미션 ${p.commissionRate}%</span>
            </div>
            <div class="btn-row" style="margin-top:10px;">
              <button class="btn primary" ${approved ? "" : "disabled"} onclick="openBuyerForProduct(${p.id})">내 전용 판매 URL 보기</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderCuratorProductCard(p) {
      const already = state.applications.some(a => a.curatorName === "이순자" && a.productId === p.id);
      return `
        <div class="product-card">
          <img class="thumb" src="${p.mainImage}" alt="${p.name}" />
          <div>
            <div class="product-title">${p.name}</div>
            <div class="meta">${p.area} · 재고 ${p.stock}개</div>
            <div class="price">${money(p.price)}</div>
            <div class="badge-row">
              <span class="badge blue">커미션 ${p.commissionRate}%</span>
              <span class="badge green">${p.status}</span>
            </div>
            <div class="btn-row" style="margin-top:10px;">
              <button class="btn" onclick="setCuratorTab('apply')">상세 보고 신청하기</button>
              ${already ? `<span class="badge yellow">이미 신청함</span>` : ""}
            </div>
          </div>
        </div>
      `;
    }

    function renderCuratorApply() {
      return `
        <div class="section-head">
          <div>
            <h2>큐레이터 상품 신청</h2>
            <div class="section-sub">판매하고 싶은 상품을 확인한 뒤 신청합니다.</div>
          </div>
        </div>

        <div class="notice">
          동일 거주지 반경 3km 이내에서는 동일 상품 중복 신청이 제한될 수 있습니다.
          지역 독점성과 큐레이터 간 충돌 방지를 위한 안내 문구입니다.
        </div>

        <div class="card-list">
          ${state.products.map(p => renderApplyProductCard(p)).join("")}
        </div>
      `;
    }

    function renderApplyProductCard(p) {
      const already = state.applications.some(a => a.curatorName === "이순자" && a.productId === p.id);
      return `
        <div class="panel">
          <div class="product-card" style="box-shadow:none; border:0; padding:0;">
            <img class="thumb" src="${p.mainImage}" alt="${p.name}" />
            <div>
              <div class="product-title">${p.name}</div>
              <div class="meta">${p.desc}</div>
              <div class="price">${money(p.price)}</div>
              <div class="badge-row">
                <span class="badge blue">커미션 ${p.commissionRate}%</span>
                <span class="badge">${p.area}</span>
                <span class="badge ${p.status === "판매중" ? "green" : "yellow"}">${p.status}</span>
              </div>
            </div>
          </div>
          <div class="divider"></div>
          <img class="detail-img" src="${p.detailImage}" alt="${p.name} 상세 이미지" />
          <div class="btn-row" style="margin-top:14px;">
            <button class="btn primary block" ${already || p.status !== "판매중" ? "disabled" : ""} onclick="applyProduct(${p.id})">
              ${already ? "신청 완료" : "이 상품 신청하기"}
            </button>
          </div>
        </div>
      `;
    }

    function applyProduct(productId) {
      const already = state.applications.some(a => a.curatorName === "이순자" && a.productId === productId);
      if (already) {
        showToast("이미 신청한 상품입니다.");
        return;
      }

      state.applications.unshift({
        id: Date.now(),
        productId,
        curatorName: "이순자",
        area: "서울 송파구",
        grade: "A",
        status: "승인대기"
      });

      showToast("상품 신청이 완료되었습니다.");
      renderCurator();
    }

    function openBuyerForProduct(productId) {
      state.selectedBuyerProductId = productId;
      state.buyerStep = "detail";
      openRole("buyer");
    }

    function renderBuyer() {
      const content = document.getElementById("buyerContent");
      if (state.buyerStep === "detail") content.innerHTML = renderBuyerDetail();
      if (state.buyerStep === "complete") content.innerHTML = renderBuyerComplete();
    }

    function renderBuyerDetail() {
      const p = productById(state.selectedBuyerProductId) || state.products[0];

      return `
        <div class="buyer-shell">
          <div class="section-head">
            <div>
              <h2>구매자 상품 화면</h2>
              <div class="section-sub">큐레이터 전용 URL을 받은 고객이 보는 화면입니다.</div>
            </div>
          </div>

          <div class="field" style="margin-bottom:12px;">
            <label>테스트할 상품 선택</label>
            <select onchange="state.selectedBuyerProductId = Number(this.value); renderBuyer();">
              ${state.products.map(prod => `<option value="${prod.id}" ${prod.id === p.id ? "selected" : ""}>${prod.name}</option>`).join("")}
            </select>
          </div>

          <div class="buyer-product">
            <img class="buyer-main-img" src="${p.mainImage}" alt="${p.name}" />
            <div class="buyer-body">
              <div class="badge-row">
                <span class="badge blue">이순자 큐레이터 추천</span>
                <span class="badge green">${p.status}</span>
              </div>
              <h2 style="margin-top:10px;">${p.name}</h2>
              <div class="price">${money(p.price)}</div>
              <div class="recommend">
                “제가 직접 확인하고 추천하는 공동구매 상품입니다. 동네 분들과 함께 좋은 가격으로 구매해보세요.”
              </div>
              <p class="small">${p.desc}</p>
              <img class="detail-img" src="${p.detailImage}" alt="${p.name} 상세 이미지" />

              <div class="divider"></div>

              <h3>주문 정보 입력</h3>
              <form onsubmit="placeOrder(event, ${p.id})">
                <div class="form-grid">
                  <div class="field">
                    <label>구매자 이름</label>
                    <input name="buyerName" required placeholder="홍길동" />
                  </div>
                  <div class="field">
                    <label>연락처</label>
                    <input name="phone" required placeholder="010-0000-0000" />
                  </div>
                  <div class="field span-2">
                    <label>주소</label>
                    <input name="address" required placeholder="배송받을 주소" />
                  </div>
                  <div class="field">
                    <label>수량</label>
                    <input name="quantity" type="number" min="1" value="1" required />
                  </div>
                </div>
                <button class="btn primary block" style="margin-top:14px;" type="submit">주문하기</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function placeOrder(event, productId) {
      event.preventDefault();
      const fd = new FormData(event.target);
      const quantity = Math.max(1, safeNum(fd.get("quantity")));

      state.orders.unshift({
        id: Date.now(),
        buyerName: fd.get("buyerName").trim(),
        phone: fd.get("phone").trim(),
        address: fd.get("address").trim(),
        productId,
        quantity,
        curatorName: "이순자",
        status: "주문접수",
        createdAt: new Date().toISOString().slice(0, 10)
      });

      const p = productById(productId);
      p.stock = Math.max(0, p.stock - quantity);

      state.buyerStep = "complete";
      showToast("주문이 완료되었습니다.");
      renderBuyer();
    }

    function renderBuyerComplete() {
      return `
        <div class="buyer-shell">
          <div class="complete-box">
            <div class="complete-icon">✓</div>
            <h2>주문이 완료되었습니다</h2>
            <p class="small">큐레이터가 주문 내용을 확인한 뒤 안내를 도와드립니다.</p>
            <div class="btn-row" style="margin-top:18px; justify-content:center;">
              <button class="btn primary" onclick="state.buyerStep='detail'; renderBuyer();">다른 상품 보기</button>
              <button class="btn" onclick="openRole('admin'); setAdminTab('orders');">관리자 주문 확인</button>
            </div>
          </div>
        </div>
      `;
    }

    renderAdmin();
    renderCurator();
  </script>
</body>
</html>
